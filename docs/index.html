<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI + Code 每日速递</title>
  <style>
    :root{--bg-primary:#0a0a0f;--bg-secondary:#12121a;--text-secondary:#a0a0b0;--accent:#6366f1;--accent-cyan:#22d3ee;--border:#2a2a3a}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);color:#fff;line-height:1.6;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
    .header{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:0.75rem 2rem;width:100%;display:flex;align-items:center;gap:1rem;position:fixed;top:0}
    .header__topic{color:var(--accent-cyan);font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em}
    .header__title{font-weight:600;font-size:1rem}
    .hero{text-align:center;padding:3rem 2rem}
    .hero h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#fff,var(--accent-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.5rem}
    .hero p{color:var(--text-secondary);font-size:1rem}
    .placeholder{text-align:center;padding:2rem;color:var(--text-secondary)}
    .placeholder p{color:#64748b;margin-top:1rem;font-size:0.9rem}
  </style>
</head>
<body>
  <header class="header">
    <span class="header__topic">TTBB</span>
    <span class="header__title">AI + Code 每日速递</span>
  </header>
  <section class="hero">
    <h1>AI + Code 每日速递</h1>
    <p>GitHub Trending · AI 分析 · 技术趋势</p>
  </section>
  <div class="placeholder">
    <p>每日 9:00 (北京时间) 自动更新</p>
    <p style="font-size:0.85rem;margin-top:0.5rem">GitHub Actions 调度中 · MiniMax AI 分析</p>
  </div>
</body>
</html>
