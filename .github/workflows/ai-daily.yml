name: AI Daily Update

on:
  schedule:
    # 每天北京时间 9:00 = UTC 1:00
    - cron: "0 1 * * *"
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ai-daily
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Git config
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs and Material
        run: |
          pip install mkdocs-material 'mkdocs-git-revision-date-localized-plugin[jinja2]' ghp-import

      - name: Run AI Daily Script
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL || 'https://api.minimax.chat/v1' }}
          MINIMAX_MODEL_NAME: ${{ secrets.MINIMAX_MODEL_NAME || 'MiniMax-Text-01' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/ai-daily-generate.sh
          bash scripts/ai-daily-generate.sh

      - name: Build MkDocs site
        run: |
          mkdocs build --strict --verbose

      - name: Commit & Push
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-update AI daily $(date +'%Y-%m-%d')"
            git push origin main || git push -u origin main
          fi

  deploy-pages:
    needs: generate-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build MkDocs site
        run: pip install mkdocs-material 'mkdocs-git-revision-date-localized-plugin[jinja2]' && mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4