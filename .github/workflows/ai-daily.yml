name: AI Daily Update

on:
  # 代码 push 到 main 不会自动触发（避免循环：生成内容 push → 触发 workflow → 循环）
  # 手动触发：Actions 页面点击 "Run workflow" 按钮
  # 自动触发：每天北京时间 9:00
  workflow_dispatch:
  schedule:
    # 每天北京时间 9:00 = UTC 1:00
    - cron: "0 1 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ai-daily
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Git config
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure rules directory
        run: mkdir -p rules

      - name: Ensure data directory
        run: mkdir -p docs/data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yq jq

      - name: Run AI Daily Script

      - name: Run AI Daily Script
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL || 'https://api.minimaxi.com/anthropic' }}
          MINIMAX_MODEL_NAME: ${{ secrets.MINIMAX_MODEL_NAME || 'MiniMax-M2.7' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/ai-daily-generate.sh
          bash scripts/ai-daily-generate.sh

      - name: Commit & Push
        run: |
          git add docs/ rules/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            ENTRY_COUNT=$(ls docs/daily/*.md 2>/dev/null | wc -l | tr -d ' ' || echo 0)
            git commit -m "docs: auto-update AI daily $(date +'%Y-%m-%d') [$ENTRY_COUNT entries]"
            git push origin main || git push -u origin main
          fi

  deploy-pages:
    needs: generate-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: |
          pip install mkdocs-material 'mkdocs-git-revision-date-localized-plugin[jinja2]'

      - name: Build MkDocs site
        run: mkdocs build --strict --verbose

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4