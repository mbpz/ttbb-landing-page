name: AI Daily Update

on:
  # 代码推送（排除自动生成内容，避免循环触发）
  push:
    branches: [main]
    paths-ignore:
      - 'docs/daily/**'
      - 'docs/data/**'
  # 手动触发
  workflow_dispatch:
  # 每天北京时间 9:00 = UTC 1:00
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ai-daily
  cancel-in-progress: false

jobs:
  # Job 1: 定时/手动触发时搜集数据并生成每日 MD
  generate:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Git config
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          pip install yq

      - name: Ensure directories
        run: |
          mkdir -p rules
          mkdir -p docs/data

      - name: Run AI Daily Script
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL || 'https://api.minimax.chat/v1' }}
          MINIMAX_MODEL_NAME: ${{ secrets.MINIMAX_MODEL_NAME || 'MiniMax-M2.7' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/ai-daily-generate.sh
          bash scripts/ai-daily-generate.sh

      - name: Commit & Push generated content
        run: |
          git add docs/daily/ docs/data/
          if git diff --staged --quiet; then
            echo "No new daily content to commit"
          else
            ENTRY_COUNT=$(ls docs/daily/*.md 2>/dev/null | wc -l | tr -d ' ' || echo 0)
            git commit -m "docs: auto-update AI daily $(date +'%Y-%m-%d') [$ENTRY_COUNT entries]"
            git push origin main || git push -u origin main
          fi

  # Job 2: 构建并部署 MkDocs 站点到 GitHub Pages
  deploy:
    needs: [generate]
    if: |
      always() &&
      (needs.generate.result == 'success' || needs.generate.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: |
          pip install mkdocs-material 'mkdocs-git-revision-date-localized-plugin[jinja2]'

      - name: Build MkDocs site
        run: mkdocs build --strict --verbose

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4